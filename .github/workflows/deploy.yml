name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build project
        run: |
          cd frontend
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare FTP Path
        id: prepare_path
        run: |
          PATH_VAL="${{ secrets.FTP_REMOTE_PATH }}"
          if [ -z "$PATH_VAL" ]; then
            PATH_VAL="/"
          elif [[ "$PATH_VAL" != */ ]]; then
            PATH_VAL="$PATH_VAL/"
          fi
          echo "ftp_path=$PATH_VAL" >> $GITHUB_OUTPUT

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ steps.prepare_path.outputs.ftp_path }}
